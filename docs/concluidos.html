<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concluídos — Gold Line</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="conclui.css">
</head>
<body>


<canvas id="particles"></canvas>

<!-- HEADER -->
<header>
  <a href="index.html" class="logo">
    <span class="logo-main">GOLD LINE</span>
    <span class="logo-sub"> · Pernambuco</span>
  </a>
  <div class="header-right">
    <a href="painel.html" class="btn-voltar">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M8 2L4 6.5 8 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Voltar
    </a>
    <button class="btn-apagar" id="btnApagar" onclick="confirmarApagar()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 3h8M5 3V2h2v1M4 3v7h4V3H4z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Apagar todos
    </button>
  </div>
</header>

<!-- PAGE INTRO -->
<div class="page-intro">
  <div class="intro-inner">
    <div>
      <div class="eyebrow">Histórico</div>
      <h1 class="page-title">Serviços <em>concluídos</em></h1>
    </div>
    <button class="btn-reload" onclick="carregarConcluidos()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M12.5 7A5.5 5.5 0 1 1 7 1.5c1.8 0 3.4.87 4.4 2.2M12.5 1.5v3.5H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Atualizar
    </button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Concluídos</div></div>
  <div class="stat"><div class="stat-num" id="statValor">—</div><div class="stat-lbl">Total faturado</div></div>
  <div class="stat"><div class="stat-num" id="statTicket">—</div><div class="stat-lbl">Ticket médio</div></div>
</div>

<!-- LISTA -->
<div class="main-wrap">
  <div class="sec-label">Histórico de atendimentos</div>
  <div id="lista"></div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑</div>
    <h3>Apagar tudo?</h3>
    <p>Esta ação vai remover permanentemente todos os agendamentos concluídos. Não há como desfazer.</p>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-txt" id="progressTxt">Aguarde...</div>
    </div>
    <div class="confirm-actions" id="confirmActions">
      <button class="confirm-yes" onclick="executarApagar()">Sim, apagar</button>
      <button class="confirm-no" onclick="fecharConfirm()">Cancelar</button>
    </div>
  </div>
</div>
<script src="conclui.js"></script>
</body>
</html>
