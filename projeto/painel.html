<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Gold Line</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="painel.css">
<style>
/* ── GRADE DE PROFISSIONAIS ── */
.prof-grid {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: rgba(255,255,255,0.08);
}

.prof-item {
  background: var(--dark2);
  padding: 22px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  border-left: 2px solid transparent;
  transition: background .3s, border-color .3s;
  animation: fadeUp .5s ease both;
}
.prof-item:hover { background: var(--dark3); border-left-color: var(--gold); }
.prof-item::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 14px; height: 14px;
  border-top: 1px solid rgba(201,168,76,.2);
  border-right: 1px solid rgba(201,168,76,.2);
  transition: width .35s, height .35s, border-color .35s;
}
.prof-item:hover::after { width: 24px; height: 24px; border-color: var(--gold); }

.prof-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1);
  overflow: hidden;
  flex-shrink: 0;
  background: var(--dark3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700;
  color: var(--gold);
  transition: border-color .3s;
}
.prof-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.prof-item.disponivel .prof-avatar  { border-color: rgba(21,255,0,.35); }
.prof-item.indisponivel .prof-avatar { border-color: rgba(224,80,80,.35); filter: grayscale(60%); }

.prof-info { flex: 1; min-width: 0; }
.prof-nome-txt {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 700; color: var(--cream);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.prof-esp-txt {
  font-size: 9px; letter-spacing: .25em;
  text-transform: uppercase; color: var(--muted); margin-top: 2px;
}
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 8px; letter-spacing: .22em; text-transform: uppercase;
  border: 1px solid; padding: 3px 8px; margin-top: 6px;
}
.status-badge.on  { color: var(--green); border-color: rgba(21,255,0,.3); }
.status-badge.off { color: var(--red);   border-color: rgba(224,80,80,.3); }
.status-badge::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}
.status-badge.on::before  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s ease infinite; }
.status-badge.off::before { background: var(--red); }

.btn-toggle {
  display: flex; align-items: center; gap: 6px;
  border: none;
  font-family: 'Barlow', sans-serif;
  font-size: 9px; font-weight: 500;
  letter-spacing: .15em; text-transform: uppercase;
  padding: 10px 12px;
  cursor: pointer;
  transition: all .3s;
  white-space: nowrap; flex-shrink: 0;
}
.btn-toggle.pausar {
  background: transparent; color: var(--red);
  border: 1px solid rgba(224,80,80,.35);
}
.btn-toggle.pausar:hover { background: var(--red); color: #fff; border-color: var(--red); }
.btn-toggle.ativar {
  background: transparent; color: var(--green);
  border: 1px solid rgba(21,255,0,.3);
}
.btn-toggle.ativar:hover { background: var(--green); color: var(--dark); border-color: var(--green); }
.btn-toggle:disabled { opacity: .35; cursor: not-allowed; }

/* ── MENU INFERIOR — TAB BAR MOBILE ── */
.menu-botoes {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  background: var(--dark2);
  border-top: 1px solid rgba(255,255,255,0.07);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.menu-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 2px;
  text-decoration: none;
  color: var(--muted);
  font-family: 'Barlow', sans-serif;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  border-right: 1px solid rgba(255,255,255,0.05);
  transition: color .2s, background .2s;
  min-width: 0;
  text-align: center;
  line-height: 1.2;
  -webkit-tap-highlight-color: transparent;
}
.menu-btn:last-child { border-right: none; }
.menu-btn:hover,
.menu-btn:active { color: var(--gold); background: rgba(201,168,76,0.06); }

.menu-icon {
  font-size: 20px;
  line-height: 1;
  display: block;
}

.menu-label {
  display: block;
  max-width: 100%;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding: 0 2px;
}

/* Telas muito pequenas: só ícone */
@media (max-width: 359px) {
  .menu-label { display: none; }
  .menu-btn   { padding: 14px 2px; }
}

/* Garante que o conteúdo não suma atrás do menu fixo */
.main-wrap {
  padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px)) !important;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <a href="#" class="logo">
    <span data-barber="logo">
      <span class="logo-main" data-barber="nome"></span>
      <span class="logo-sub"  data-barber="cidade"></span>
    </span>
  </a>
  <div class="header-right">
    <div class="admin-badge">
      <div class="badge-dot"></div>
      Painel Admin
    </div>
    <a href="login.html" class="btn-sair" onclick="localStorage.removeItem('token')">Sair</a>
  </div>
</header>

<div class="page-intro">
  <div class="intro-inner">
    <div>
      <div class="eyebrow">Área restrita</div>
      <h1 class="page-title">Agendamentos <em>pendentes</em></h1>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Pendentes</div></div>
  <div class="stat"><div class="stat-num" id="statValor">—</div><div class="stat-lbl">Valor em aberto</div></div>
</div>

<div class="main-wrap">
  <div class="sec-label">Lista de agendamentos</div>
  <div id="lista"></div>

  <div class="sec-label" style="margin-top:56px;">Disponibilidade dos profissionais</div>
  <div class="prof-grid" id="profGrid">
    <div class="loading-state"><div class="spin"></div>Carregando profissionais...</div>
  </div>
</div>

<!-- ── MENU TAB BAR ── -->
<div class="menu-botoes">
  <a href="painel_planos.html" class="menu-btn">
    <span class="menu-icon">💳</span>
    <span class="menu-label">Assinaturas</span>
  </a>
  <a href="lucro.html" class="menu-btn">
    <span class="menu-icon">💰</span>
    <span class="menu-label">Lucros</span>
  </a>
  <a href="concluidos.html" class="menu-btn">
    <span class="menu-icon">✔</span>
    <span class="menu-label">Concluídos</span>
  </a>
  <a href="comissao.html" class="menu-btn">
    <span class="menu-icon">✂️</span>
    <span class="menu-label">Comissões</span>
  </a>
</div>

<script src="Saas.js"></script>
<script>
/* PARTÍCULAS */
(function(){
  const canvas=document.getElementById('particles'), ctx=canvas.getContext('2d');
  ctx.filter='blur(1.5px)';
  let W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}
  for(let i=0;i<50;i++)
    pts.push({x:rand(0,1),y:rand(0,1),size:rand(.6,2),speed:rand(.00008,.00018),alpha:rand(.05,.18),drift:rand(-.0001,.0001)});
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.y-=p.speed; p.x+=p.drift;
      if(p.y<0){p.y=1;p.x=rand(0,1);}
      if(p.x<0||p.x>1) p.x=rand(0,1);
      ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,240,240,${p.alpha})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

/* TOAST */
function toast(texto, cor){
  cor = cor||'#c9a84c';
  const el=document.createElement('div');
  el.className='toast'; el.textContent=texto; el.style.background=cor;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),500); },2800);
}

const lista = document.getElementById('lista');

function formatarData(dataStr){
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [y,m,d]=dataStr.split('-');
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
}

function atualizarStats(pendentes){
  const totalValor = pendentes.reduce((s,a)=>s+(Number(a.valor)||0),0);
  document.getElementById('statTotal').textContent = pendentes.length;
  document.getElementById('statValor').textContent = 'R$'+totalValor;
}

/* ── AGENDAMENTOS ── */
async function carregarAgendamentos(){
  lista.innerHTML = '<div class="loading-state"><div class="spin"></div>Carregando agendamentos...</div>';
  try {
    const slug = localStorage.getItem("slug");
    if (!slug){ window.location.href="/login.html"; return; }

    const [resAg, resProf] = await Promise.all([
      fetch(`${API}/agendamentos`),
      fetch(`${API}/profissionais`)
    ]);

    const dados = await resAg.json();

    let mapaProf = {};
    try {
      const profs = await resProf.json();
      if(Array.isArray(profs)) profs.forEach(p=>{ mapaProf[p.id]=p; });
    } catch(e){}

    lista.innerHTML = '';
    const pendentes = dados.filter(a=>(a.status||'pendente')==='pendente');
    atualizarStats(pendentes);

    if(pendentes.length===0){
      lista.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">Nenhum agendamento pendente</div></div>`;
      return;
    }

    pendentes.forEach((item,i)=>{
      const card=document.createElement('div');
      card.classList.add('card');
      card.style.animationDelay=(i*0.06)+'s';

      const horario=(item.horario||'').toString().substring(0,5);
      const dataFmt=item.data?formatarData(item.data):'—';

      const prof=item.profissional_id?mapaProf[item.profissional_id]:null;
      const nomeProfissional=prof?prof.nome:'—';
      const fotoProfissional=prof?prof.foto_url:null;
      const inicialProf=nomeProfissional!=='—'?nomeProfissional.trim().charAt(0).toUpperCase():'?';

      const fotoHtml=fotoProfissional
        ?`<img src="${fotoProfissional}" alt="${nomeProfissional}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.innerHTML='<span style=\\'line-height:28px;font-weight:700;color:#ffc926;font-size:13px;\\'>${inicialProf}</span>'">`
        :`<span style="line-height:28px;font-weight:700;color:#ffc926;font-size:13px;">${inicialProf}</span>`;

      const info=document.createElement('div');
      info.classList.add('info');
      info.innerHTML=`
        <div class="info-item"><span class="info-label">Cliente</span><span class="info-val"><strong>${item.nome||'—'}</strong></span></div>
        <div class="info-item">
          <span class="info-label">Profissional</span>
          <span class="info-val" style="display:flex;align-items:center;gap:8px;">
            <span style="width:28px;height:28px;border-radius:50%;background:#161614;border:1px solid rgba(201,168,76,.3);display:inline-flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">${fotoHtml}</span>
            <span>${nomeProfissional}</span>
          </span>
        </div>
        <div class="info-item"><span class="info-label">Data</span><span class="info-val">${dataFmt}</span></div>
        <div class="info-item"><span class="info-label">Horário</span><span class="info-val">${horario||'—'}</span></div>
        <div class="info-item"><span class="info-label">Status</span><span class="info-val"><span class="status-tag pendente">Pendente</span></span></div>
      `;

      const valor=document.createElement('div');
      valor.className='valor-tag';
      valor.textContent='R$'+(item.valor||0);

      const actions=document.createElement('div');
      actions.className='card-actions';

      const btnC=document.createElement('button');
      btnC.className='btn-concluir';
      btnC.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Concluir';
      btnC.addEventListener('click',async()=>{
        btnC.disabled=true; btnX.disabled=true;
        try{
          const r=await fetch(`${API}/agendamentos/concluir/${item.id}`,{method:'PUT'});
          if(!r.ok) throw new Error();
          toast('✓ Agendamento concluído!');
          carregarAgendamentos();
        }catch{
          toast('Erro ao concluir','#e05050');
          btnC.disabled=false; btnX.disabled=false;
        }
      });

      const btnX=document.createElement('button');
      btnX.className='btn-cancelar';
      btnX.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Cancelar';
      btnX.addEventListener('click',async()=>{
        btnC.disabled=true; btnX.disabled=true;
        try{
          const r=await fetch(`${API}/agendamentos/${item.id}`,{method:'DELETE'});
          if(!r.ok) throw new Error();
          toast('Agendamento cancelado','#e05050');
          carregarAgendamentos();
        }catch{
          toast('Erro ao cancelar','#e05050');
          btnC.disabled=false; btnX.disabled=false;
        }
      });

      const btnLembrete=document.createElement('button');
      btnLembrete.className='btn-lembrete';
      btnLembrete.innerHTML='📲 Lembrar';
      btnLembrete.addEventListener('click',()=>{
        let telefone=(item.telefone||'').replace(/\D/g,'');
        if(!telefone){ toast('Cliente sem telefone','#e05050'); return; }
        if(!telefone.startsWith('55')) telefone='55'+telefone;
        const mensagem=`CONFIRMAÇÃO DE HORÁRIO\n\nOlá, ${item.nome}.\n\nSeu atendimento na barbearia está agendado para:\n\nData: ${dataFmt}\nHorário: ${horario}\nProfissional: ${nomeProfissional}\n\nTrabalhamos com horários organizados, então pedimos pontualidade.\n\nEm caso de imprevisto, entre em contato.\n\nSerá um prazer atendê-lo.`;
        window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`,'_blank');
      });

      actions.appendChild(btnLembrete);
      actions.appendChild(btnC);
      actions.appendChild(btnX);
      card.appendChild(info);
      card.appendChild(valor);
      card.appendChild(actions);
      lista.appendChild(card);
    });

  } catch(err){
    console.error('Erro geral:',err);
    lista.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">Erro ao carregar agendamentos</div></div>`;
  }
}

/* ── PROFISSIONAIS — TOGGLE DISPONIBILIDADE ── */
async function carregarProfissionaisAdmin(){
  const grid = document.getElementById('profGrid');
  try {
    const res  = await fetch(`${API}/profissionais`);
    const list = await res.json();
    grid.innerHTML = '';

    if(!Array.isArray(list) || list.length === 0){
      grid.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><div class="empty-txt">Nenhum profissional cadastrado</div></div>`;
      return;
    }

    list.forEach((prof, i) => {
      const disponivel = prof.disponivel !== false;
      const item = document.createElement('div');
      item.className = `prof-item ${disponivel ? 'disponivel' : 'indisponivel'}`;
      item.style.animationDelay = (i * 0.07) + 's';

      const avatarEl = document.createElement('div');
      avatarEl.className = 'prof-avatar';
      if(prof.foto_url){
        const img = document.createElement('img');
        img.src = prof.foto_url; img.alt = prof.nome;
        img.onerror = () => { avatarEl.textContent = prof.nome.trim().charAt(0).toUpperCase(); };
        avatarEl.appendChild(img);
      } else {
        avatarEl.textContent = prof.nome.trim().charAt(0).toUpperCase();
      }

      const infoEl = document.createElement('div');
      infoEl.className = 'prof-info';
      infoEl.innerHTML = `
        <div class="prof-nome-txt">${prof.nome}</div>
        ${prof.especialidade ? `<div class="prof-esp-txt">${prof.especialidade}</div>` : ''}
        <div class="status-badge ${disponivel ? 'on' : 'off'}">
          ${disponivel ? 'Aceitando agendamentos' : 'Agendamentos pausados'}
        </div>
      `;

      const btn = document.createElement('button');
      btn.className = `btn-toggle ${disponivel ? 'pausar' : 'ativar'}`;
      btn.innerHTML = disponivel
        ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="2" width="3" height="8" rx="1" fill="currentColor"/><rect x="7" y="2" width="3" height="8" rx="1" fill="currentColor"/></svg> Pausar`
        : `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 2l7 4-7 4V2z" fill="currentColor"/></svg> Ativar`;

      btn.addEventListener('click', () => alternarDisponibilidade(prof.id, disponivel, item, btn, infoEl));

      item.appendChild(avatarEl);
      item.appendChild(infoEl);
      item.appendChild(btn);
      grid.appendChild(item);
    });

  } catch(err){
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">Erro ao carregar profissionais</div></div>`;
  }
}

async function alternarDisponibilidade(id, disponivel_atual, itemEl, btn, infoEl){
  btn.disabled = true;
  const novoStatus = !disponivel_atual;
  try {
    const r = await fetch(`${API}/profissionais/${id}/disponibilidade`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ disponivel: novoStatus })
    });
    if(!r.ok) throw new Error();

    itemEl.classList.toggle('disponivel',    novoStatus);
    itemEl.classList.toggle('indisponivel', !novoStatus);

    const badge = infoEl.querySelector('.status-badge');
    badge.className = `status-badge ${novoStatus ? 'on' : 'off'}`;
    badge.textContent = novoStatus ? 'Aceitando agendamentos' : 'Agendamentos pausados';

    btn.className = `btn-toggle ${novoStatus ? 'pausar' : 'ativar'}`;
    btn.innerHTML = novoStatus
      ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="2" width="3" height="8" rx="1" fill="currentColor"/><rect x="7" y="2" width="3" height="8" rx="1" fill="currentColor"/></svg> Pausar`
      : `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 2l7 4-7 4V2z" fill="currentColor"/></svg> Ativar`;

    const novoBtnClone = btn.cloneNode(true);
    btn.parentNode.replaceChild(novoBtnClone, btn);
    novoBtnClone.innerHTML = btn.innerHTML;
    novoBtnClone.addEventListener('click', () => alternarDisponibilidade(id, novoStatus, itemEl, novoBtnClone, infoEl));

    toast(
      novoStatus ? '✓ Agendamentos ativados!' : '⏸ Agendamentos pausados',
      novoStatus ? '#15ff00' : '#e05050'
    );
  } catch {
    toast('Erro ao atualizar', '#e05050');
    btn.disabled = false;
  }
}

carregarAgendamentos();
carregarProfissionaisAdmin();
</script>
</body>
</html>
