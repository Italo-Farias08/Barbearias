<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cortes.css">
</head>
<body>
<canvas id="particles"></canvas>
<header>
   <a href="#" class="logo">
    <!-- ✅ data-barber="logo" → Saas.js coloca a imagem ou o nome aqui -->
    <span data-barber="logo">
      <!-- fallback visível antes do JS carregar -->
      <span class="logo-main" data-barber="nome"></span>
      <span class="logo-sub"  data-barber="cidade"></span>
    </span>
  </a>
  <div class="header-right">
    <div class="step-tag">
      <div class="step-dot"></div>
      Passo 1 de 2 — Escolha o serviço
    </div>
  </div>
</header>

<div class="page-hero">
  <div class="hero-inner">
    <div class="eyebrow">Serviços disponíveis</div>
    <h1 class="page-title">Qual vai<br><em>ser hoje?</em></h1>
    <p class="page-sub">Selecione o serviço e escolha seu horário.</p>
  </div>
</div>

<div class="cortes-wrap">
  <div class="cortes-grid" id="listaServicos">
  </div>
</div>

<footer>
  <span>&copy; 2026 Italo Farias</span>
  <a href="index.html">← Voltar ao início</a>
</footer>
<a href="planos.html" class="btn-assinaturas">
  💈 Assinaturas
</a>

<script src="Saas.js"></script>
<script>
// ✅ CORRIGIDO: salva com slug na chave para não misturar entre barbearias
function selecionarServico(valor, nome) {
  const slug = BARBER_SLUG; // vem do Saas.js
  localStorage.setItem(`valorServico_${slug}`, valor);
  localStorage.setItem(`nomeServico_${slug}`, nome);
}

(function(){
  const canvas=document.getElementById('particles'),
        ctx=canvas.getContext('2d');
  ctx.filter='blur(1.5px)';
  let W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}
  for(let i=0;i<50;i++)
    pts.push({x:rand(0,1),y:rand(0,1),size:rand(.6,2),speed:rand(.00008,.00018),alpha:rand(.05,.18),drift:rand(-.0001,.0001)});
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.y-=p.speed;p.x+=p.drift;
      if(p.y<0){p.y=1;p.x=rand(0,1);}
      if(p.x<0||p.x>1)p.x=rand(0,1);
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,240,240,${p.alpha})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

async function carregarServicos() {
  try {
    const res = await fetch(`${API}/servicos`);
    const servicos = await res.json();

    const grid = document.getElementById('listaServicos');
    grid.innerHTML = '';

    servicos.forEach(s => {
      const el = document.createElement('a');
      el.onclick = (e) => {
        e.preventDefault();
        selecionarServico(s.preco, s.nome);

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('b');
        let url = "index2.html";
        if (slug) url += `?b=${slug}`;
        window.location.href = url;
      };
      el.className = "corte-link";
      el.innerHTML = `
        <div class="corte-img-wrap">
          <img src="${s.imagem}" alt="${s.nome}">
          <div class="select-label"><span>Selecionar</span></div>
        </div>
        <div class="corte-info">
          <div class="corte-nome">${s.nome}</div>
          <div class="corte-price">
            <span class="price-from">a partir de</span>
            <span class="price-val">R$${s.preco}</span>
          </div>
        </div>
      `;
      grid.appendChild(el);
    });

  } catch (err) {
    console.error("Erro ao carregar serviços");
  }
}

carregarServicos();
</script>
</body>
</html>
