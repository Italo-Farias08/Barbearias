<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comissões — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="painel.css">
<style>

/* ── ABAS DE PERÍODO ── */
.periodo-tabs {
  display: flex;
  gap: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 32px;
}
.periodo-tab {
  flex: 1;
  padding: 14px 10px;
  text-align: center;
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--dark2);
  border: none;
  cursor: pointer;
  transition: all .2s;
}
.periodo-tab.ativo { background: var(--gold); color: var(--dark); }
.periodo-tab:hover:not(.ativo) { background: var(--dark3); color: var(--cream); }

/* ── SELETOR DE DATA CUSTOM ── */
.data-picker-wrap {
  display: none;
  gap: 10px;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.data-picker-wrap.visivel { display: flex; }
.data-picker-wrap input {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--cream);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .2s;
}
.data-picker-wrap input:focus { border-color: var(--gold); }
.btn-buscar {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: var(--gold);
  font-family: 'Barlow', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: .2em; text-transform: uppercase;
  padding: 11px 22px; cursor: pointer;
  transition: all .3s;
}
.sec-label{
    padding-left: 20px;
}
.btn-buscar:hover { background: var(--gold); color: var(--dark); }

/* ── RESUMO GERAL ── */
.resumo-box {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 40px;
}
.resumo-celula {
  background: var(--dark2);
  padding: 24px 20px;
  text-align: center;
}
.resumo-num {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700;
  line-height: 1; color: var(--cream);
}
.resumo-num.dourado  { color: var(--gold); }
.resumo-num.verde    { color: var(--green); }
.resumo-num.vermelho { color: var(--red); }
.resumo-leg {
  font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted);
  margin-top: 6px;
}

/* ── CARD DO BARBEIRO ── */
.barb-card {
  background: var(--dark2);
  margin-bottom: 2px;
  border-left: 3px solid transparent;
  transition: border-color .3s;
  animation: fadeUp .4s ease both;
}
.barb-card:hover { border-left-color: var(--gold); }

.barb-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 22px 24px 18px;
  cursor: pointer;
  user-select: none;
}
.barb-avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--dark3);
  border: 2px solid rgba(201,168,76,.2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; color: var(--gold);
  overflow: hidden; flex-shrink: 0;
}
.barb-avatar img { width: 100%; height: 100%; object-fit: cover; }
.barb-info { flex: 1; }
.barb-nome {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700; color: var(--cream);
}
.data-picker-wrap input,
.form-novo-ajuste input,
.config-section input {
  font-size: 16px;
}
.barb-sub {
  font-size: 10px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--muted); margin-top: 2px;
}
.barb-pagar { text-align: right; }
.barb-pagar-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: var(--green); line-height: 1;
}
.barb-pagar-leg {
  font-size: 8px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted); margin-top: 3px;
}
.barb-chevron {
  color: var(--muted); font-size: 18px;
  margin-left: 8px; transition: transform .3s; flex-shrink: 0;
}
.barb-card.aberto .barb-chevron { transform: rotate(180deg); }

/* ── DETALHE EXPANSÍVEL ── */
.barb-detalhe {
  display: none;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 0 24px 24px;
}
.barb-card.aberto .barb-detalhe { display: block; }

.detalhe-linha {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px; color: var(--cream);
}
.detalhe-linha:last-of-type { border-bottom: none; }
.detalhe-label { color: var(--muted); font-size: 12px; }
.detalhe-val { font-weight: 500; }
.detalhe-val.verde    { color: var(--green); }
.detalhe-val.vermelho { color: var(--red); }
.detalhe-val.dourado  { color: var(--gold); }

/* ── BOTÕES DE SEÇÃO ── */
.toggle-secao {
  display: flex; gap: 8px;
  margin-top: 18px; flex-wrap: wrap;
}
.btn-secao {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--muted);
  font-family: 'Barlow', sans-serif;
  font-size: 9px; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase;
  padding: 7px 14px; cursor: pointer;
  transition: all .2s;
}
.btn-secao.ativo  { border-color: var(--gold); color: var(--gold); }
.btn-secao:hover:not(.ativo) { border-color: rgba(255,255,255,.2); color: var(--cream); }

.secao-bloco { display: none; margin-top: 16px; }
.secao-bloco.visivel { display: block; }

/* ── AJUSTES ── */
.ajustes-titulo-s {
  font-size: 9px; letter-spacing: .25em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.ajuste-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  animation: fadeUp .3s ease both;
}
.ajuste-row-desc { flex: 1; font-size: 13px; color: var(--cream); }
.ajuste-row-val  { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; }
.ajuste-row-val.pos { color: var(--green); }
.ajuste-row-val.neg { color: var(--red); }
.btn-rm {
  background: none; border: none;
  color: rgba(255,255,255,0.2); font-size: 18px;
  cursor: pointer; padding: 0 2px; line-height: 1;
  transition: color .2s;
}
.btn-rm:hover { color: var(--red); }

.form-novo-ajuste {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 14px; align-items: flex-end;
}
.form-novo-ajuste input {
  background: var(--dark);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--cream);
  font-family: 'Barlow', sans-serif;
  font-size: 16px; padding: 9px 12px;
  outline: none; transition: border-color .2s;
}
.form-novo-ajuste input:focus { border-color: var(--gold); }
.inp-desc-aj { flex: 1; min-width: 150px; }

.inp-val-aj  {
     width: 110px;
     font-size: 16px;
    }
.btn-add-aj {
  background: transparent;
  border: 1px solid rgba(21,255,0,.3);
  color: var(--green);
  font-family: 'Barlow', sans-serif;
  font-size: 9px; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase;
  padding: 10px 14px; cursor: pointer;
  transition: all .3s; white-space: nowrap;
}
.btn-add-aj:hover { background: var(--green); color: var(--dark); }
.btn-add-aj:disabled { opacity: .35; cursor: not-allowed; }

/* ── CONFIG % ── */
.config-section {
  display: flex; flex-wrap: wrap;
  gap: 10px; align-items: flex-end;
}
.config-section label {
  display: flex; flex-direction: column; gap: 4px;
  font-size: 9px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted);
}
.config-section input {
  background: var(--dark);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--cream);
  font-family: 'Barlow', sans-serif;
  font-size: 16px; padding: 9px 12px; width: 100px;
  outline: none; transition: border-color .2s;
}
.config-section input:focus { border-color: var(--gold); }
.btn-salvar-pct {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: var(--gold);
  font-family: 'Barlow', sans-serif;
  font-size: 9px; font-weight: 500;
  letter-spacing: .2em; text-transform: uppercase;
  padding: 10px 16px; cursor: pointer; transition: all .3s;
}
.btn-salvar-pct:hover { background: var(--gold); color: var(--dark); }
.btn-salvar-pct:disabled { opacity: .35; cursor: not-allowed; }

/* ── ESTADOS ── */
.loading-state {
  padding: 48px 32px; text-align: center;
  color: var(--muted); font-size: 13px;
}
.spin {
  width: 20px; height: 20px;
  border: 2px solid rgba(201,168,76,.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <a href="painel.html" class="logo">
    <span data-barber="logo">
      <span class="logo-main" data-barber="nome"></span>
    </span>
  </a>
  <div class="header-right">
    <div class="admin-badge"><div class="badge-dot"></div>Painel Admin</div>
    <a href="login.html" class="btn-sair" onclick="localStorage.removeItem('token')">Sair</a>
  </div>
</header>

<div class="page-intro">
  <div class="intro-inner">
    <div>
      <div class="eyebrow">Financeiro</div>
      <h1 class="page-title">Comissões dos <em>barbeiros</em></h1>
    </div>
  </div>
</div>

<div class="main-wrap">

  <!-- PERÍODO -->
  <div class="sec-label">Período</div>
  <div class="periodo-tabs">
    <button class="periodo-tab ativo" data-periodo="mes">Este mês</button>
    <button class="periodo-tab" data-periodo="semana">Esta semana</button>
    <button class="periodo-tab" data-periodo="hoje">Hoje</button>
    <button class="periodo-tab" data-periodo="custom">Escolher data</button>
  </div>

  <div class="data-picker-wrap" id="customPicker">
    <input type="date" id="filtroData">
    <button class="btn-buscar" id="btnBuscar">Buscar</button>
  </div>

  <!-- RESUMO -->
  <div class="sec-label">Resumo</div>
  <div class="resumo-box" id="resumoBox">
    <div class="resumo-celula" style="grid-column:1/-1">
      <div class="loading-state"><div class="spin"></div>Carregando...</div>
    </div>
  </div>

  <!-- BARBEIROS -->
  <div class="sec-label">
    Por barbeiro
    <span style="color:var(--muted);font-size:10px;letter-spacing:.1em;font-weight:400;margin-left:8px;">toque para ver detalhes</span>
  </div>
  <div id="barbGrid">
    <div class="loading-state"><div class="spin"></div>Carregando...</div>
  </div>

</div>

<div class="menu-botoes">
  <a href="painel.html" class="menu-btn">
    <span class="menu-icon">📋</span>
    Agendamentos
  </a>
  <a href="lucro.html" class="menu-btn lucro">
    <span class="menu-icon">💰</span>
    Lucros
  </a>
  <a href="concluidos.html" class="menu-btn concluidos">
    <span class="menu-icon">✔</span>
    Concluídos
  </a>
</div>

<script src="Saas.js"></script>
<script>
/* ── PARTÍCULAS ── */
(function(){
  const c=document.getElementById('particles'),x=c.getContext('2d');
  x.filter='blur(1.5px)';
  let W,H,p=[];
  function r(){W=c.width=innerWidth;H=c.height=innerHeight;}
  r();addEventListener('resize',r);
  const rnd=(a,b)=>a+Math.random()*(b-a);
  for(let i=0;i<50;i++) p.push({x:rnd(0,1),y:rnd(0,1),s:rnd(.6,2),v:rnd(.00008,.00018),a:rnd(.05,.18),d:rnd(-.0001,.0001)});
  (function draw(){
    x.clearRect(0,0,W,H);
    p.forEach(o=>{
      o.y-=o.v;o.x+=o.d;
      if(o.y<0){o.y=1;o.x=rnd(0,1);}
      if(o.x<0||o.x>1)o.x=rnd(0,1);
      x.beginPath();x.arc(o.x*W,o.y*H,o.s,0,Math.PI*2);
      x.fillStyle=`rgba(240,240,240,${o.a})`;x.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

/* ── TOAST ── */
function toast(txt,cor){
  cor=cor||'#c9a84c';
  const el=document.createElement('div');
  el.className='toast';el.textContent=txt;el.style.background=cor;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),500);},2800);
}

const fmt = v => 'R$ '+Number(v).toFixed(2).replace('.',',');

/* ── ESTADO ── */
let periodoAtivo = 'mes';
let dataCustom   = '';
let mesRef       = '';

function periodoParaParams(){
  const hoje = new Date();
  const pad  = n=>String(n).padStart(2,'0');
  const iso  = d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  if(periodoAtivo==='hoje')   return `data=${iso(hoje)}`;
  if(periodoAtivo==='custom') return `data=${dataCustom}`;
  if(periodoAtivo==='semana'){
    const seg=new Date(hoje);
    const dia=hoje.getDay();
    seg.setDate(hoje.getDate()-(dia===0?6:dia-1));
    return `data=${iso(seg)}&data_fim=${iso(hoje)}`;
  }
  return `mes=${hoje.getFullYear()}-${pad(hoje.getMonth()+1)}`;
}

function calcMesRef(){
  const hoje=new Date();
  const pad=n=>String(n).padStart(2,'0');
  if(periodoAtivo==='custom') return dataCustom.substring(0,7);
  return `${hoje.getFullYear()}-${pad(hoje.getMonth()+1)}`;
}

/* ── ABAS ── */
document.querySelectorAll('.periodo-tab').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.periodo-tab').forEach(b=>b.classList.remove('ativo'));
    this.classList.add('ativo');
    periodoAtivo=this.dataset.periodo;
    const picker=document.getElementById('customPicker');
    if(periodoAtivo==='custom'){
      picker.classList.add('visivel');
    } else {
      picker.classList.remove('visivel');
      carregarRelatorio();
    }
  });
});

document.getElementById('btnBuscar').addEventListener('click',()=>{
  dataCustom=document.getElementById('filtroData').value;
  if(!dataCustom){toast('Escolha uma data','#e05050');return;}
  carregarRelatorio();
});

/* ── CARREGAR ── */
async function carregarRelatorio(){
  const params=periodoParaParams();
  mesRef=calcMesRef();

  document.getElementById('resumoBox').innerHTML=
    '<div class="resumo-celula" style="grid-column:1/-1"><div class="loading-state"><div class="spin"></div>Carregando...</div></div>';
  document.getElementById('barbGrid').innerHTML=
    '<div class="loading-state"><div class="spin"></div>Carregando...</div>';

  try{
    const res=await fetch(`${API}/comissoes/relatorio?${params}`);
    const json=await res.json();
    renderResumo(json);
    renderBarbeiros(json);
  }catch(e){
    document.getElementById('barbGrid').innerHTML=
      '<div class="loading-state">⚠️ Erro ao carregar</div>';
  }
}

/* ── RESUMO ── */
function renderResumo(json){
  const rel=json.relatorio||[];
  const cortes     =rel.reduce((s,p)=>s+Number(p.total_cortes),0);
  const faturamento=rel.reduce((s,p)=>s+Number(p.faturamento),0);
  const comissoes  =rel.reduce((s,p)=>s+Number(p.comissao_final),0);
  const barbearia  =faturamento-comissoes;

  document.getElementById('resumoBox').innerHTML=`
    <div class="resumo-celula">
      <div class="resumo-num">${cortes}</div>
      <div class="resumo-leg">Cortes feitos</div>
    </div>
    <div class="resumo-celula">
      <div class="resumo-num dourado">${fmt(faturamento)}</div>
      <div class="resumo-leg">Faturamento</div>
    </div>
    <div class="resumo-celula">
      <div class="resumo-num vermelho">${fmt(comissoes)}</div>
      <div class="resumo-leg">Total a pagar</div>
    </div>
    <div class="resumo-celula">
      <div class="resumo-num verde">${fmt(barbearia)}</div>
      <div class="resumo-leg">Fica na barbearia</div>
    </div>
  `;
}

/* ── CARDS DOS BARBEIROS ── */
function renderBarbeiros(json){
  const grid=document.getElementById('barbGrid');
  const rel=json.relatorio||[];
  grid.innerHTML='';

  if(!rel.length){
    grid.innerHTML='<div class="loading-state">Nenhum dado neste período.</div>';
    return;
  }

  rel.forEach((prof,i)=>{
    const card=document.createElement('div');
    card.className='barb-card';
    card.style.animationDelay=(i*.07)+'s';

    const inicial=prof.profissional_nome.trim().charAt(0).toUpperCase();
    const fotoHtml=prof.foto_url
      ?`<img src="${prof.foto_url}" alt="${prof.profissional_nome}" onerror="this.parentElement.textContent='${inicial}'">`
      :inicial;

    const configTag=prof.percentual>0||Number(prof.valor_fixo)>0
      ?`${prof.percentual}%${Number(prof.valor_fixo)>0?' + R$'+Number(prof.valor_fixo).toFixed(2)+'/corte':''}`
      :'Sem comissão configurada';

    const ajustesHtml=(prof.ajustes||[]).map(aj=>`
      <div class="ajuste-row">
        <span class="ajuste-row-desc">${aj.descricao}</span>
        <span class="ajuste-row-val ${Number(aj.valor)>=0?'pos':'neg'}">${Number(aj.valor)>=0?'+':''}${fmt(aj.valor)}</span>
        <button class="btn-rm" data-ajuste-id="${aj.id}">×</button>
      </div>
    `).join('');

    card.innerHTML=`
      <div class="barb-header">
        <div class="barb-avatar">${fotoHtml}</div>
        <div class="barb-info">
          <div class="barb-nome">${prof.profissional_nome}</div>
          <div class="barb-sub">${prof.total_cortes} corte${prof.total_cortes!==1?'s':''} · ${configTag}</div>
        </div>
        <div class="barb-pagar">
          <div class="barb-pagar-val">${fmt(prof.comissao_final)}</div>
          <div class="barb-pagar-leg">A pagar</div>
        </div>
        <span class="barb-chevron">▾</span>
      </div>

      <div class="barb-detalhe">
        <div class="detalhe-linha">
          <span class="detalhe-label">Faturamento gerado</span>
          <span class="detalhe-val dourado">${fmt(prof.faturamento)}</span>
        </div>
        <div class="detalhe-linha">
          <span class="detalhe-label">Comissão base</span>
          <span class="detalhe-val">${fmt(prof.comissao_base)}</span>
        </div>
        <div class="detalhe-linha">
          <span class="detalhe-label">Ajustes manuais</span>
          <span class="detalhe-val ${Number(prof.total_ajustes)>=0?'verde':'vermelho'}">${Number(prof.total_ajustes)>=0?'+':''}${fmt(prof.total_ajustes)}</span>
        </div>
        <div class="detalhe-linha" style="border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;padding-top:14px;">
          <span class="detalhe-label" style="font-size:13px;color:var(--cream);">Total a pagar</span>
          <span class="detalhe-val verde" style="font-size:18px;">${fmt(prof.comissao_final)}</span>
        </div>

        <div class="toggle-secao">
          <button class="btn-secao" data-sec="ajustes">＋ Bônus / Desconto</button>
          <button class="btn-secao" data-sec="config">⚙ Alterar %</button>
        </div>

        <!-- AJUSTES -->
        <div class="secao-bloco" data-bloco="ajustes">
          <div class="ajustes-titulo-s">Ajustes de ${mesRef}</div>
          <div class="lista-ajustes-inner">
            ${ajustesHtml||'<div style="color:var(--muted);font-size:12px;padding:6px 0;">Nenhum ajuste ainda</div>'}
          </div>
          <div class="form-novo-ajuste">
            <input type="text"   class="inp-desc-aj" placeholder="Ex: Bônus semana, Desconto produto...">
            <input type="number" class="inp-val-aj"  placeholder="Valor (ex: -10)" step="0.01">
            <button class="btn-add-aj">Adicionar</button>
          </div>
        </div>

        <!-- CONFIG % -->
        <div class="secao-bloco" data-bloco="config">
          <div class="config-section">
            <label>% por corte
              <input type="number" class="inp-pct" value="${prof.percentual}" min="0" max="100" step="0.5">
            </label>
            <label>R$ fixo por corte
              <input type="number" class="inp-fixo" value="${Number(prof.valor_fixo).toFixed(2)}" min="0" step="0.01">
            </label>
            <button class="btn-salvar-pct">Salvar</button>
          </div>
        </div>
      </div>
    `;

    grid.appendChild(card);

    /* Abrir/fechar card */
    card.querySelector('.barb-header').addEventListener('click',()=>{
      card.classList.toggle('aberto');
    });

    /* Toggle seções */
    card.querySelectorAll('.btn-secao').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const sec=btn.dataset.sec;
        const bloco=card.querySelector(`[data-bloco="${sec}"]`);
        const jaAberto=bloco.classList.contains('visivel');
        card.querySelectorAll('.secao-bloco').forEach(b=>b.classList.remove('visivel'));
        card.querySelectorAll('.btn-secao').forEach(b=>b.classList.remove('ativo'));
        if(!jaAberto){ bloco.classList.add('visivel'); btn.classList.add('ativo'); }
      });
    });

    /* Salvar % */
    card.querySelector('.btn-salvar-pct').addEventListener('click',async function(e){
      e.stopPropagation();
      const btn=this; btn.disabled=true;
      try{
        const r=await fetch(`${API}/comissoes/config/${prof.profissional_id}`,{
          method:'PUT',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            percentual:card.querySelector('.inp-pct').value,
            valor_fixo:card.querySelector('.inp-fixo').value
          })
        });
        const d=await r.json();
        if(d.sucesso){toast('✓ Comissão salva!');carregarRelatorio();}
        else toast(d.erro||'Erro','#e05050');
      }catch{toast('Erro','#e05050');}
      btn.disabled=false;
    });

    /* Adicionar ajuste */
    card.querySelector('.btn-add-aj').addEventListener('click',async function(e){
      e.stopPropagation();
      const btn=this;
      const desc=card.querySelector('.inp-desc-aj').value.trim();
      const val=card.querySelector('.inp-val-aj').value;
      if(!desc){toast('Informe a descrição','#e05050');return;}
      if(!val||isNaN(Number(val))){toast('Informe o valor','#e05050');return;}
      btn.disabled=true;
      try{
        const r=await fetch(`${API}/comissoes/ajuste`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            profissional_id:prof.profissional_id,
            descricao:desc,valor:Number(val),referencia_mes:mesRef
          })
        });
        const d=await r.json();
        if(d.sucesso){toast('✓ Ajuste adicionado!');carregarRelatorio();}
        else toast(d.erro||'Erro','#e05050');
      }catch{toast('Erro','#e05050');}
      btn.disabled=false;
    });

    /* Remover ajuste */
    card.querySelectorAll('.btn-rm').forEach(btn=>{
      btn.addEventListener('click',async function(e){
        e.stopPropagation();
        this.disabled=true;
        try{
          const r=await fetch(`${API}/comissoes/ajuste/${this.dataset.ajusteId}`,{method:'DELETE'});
          const d=await r.json();
          if(d.sucesso){toast('Ajuste removido','#e05050');carregarRelatorio();}
          else toast(d.erro||'Erro','#e05050');
        }catch{toast('Erro','#e05050');this.disabled=false;}
      });
    });
  });
}

carregarRelatorio();
</script>
</body>
</html>
