<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comissões — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="painel.css">
<style>
/* ══════════════════════════════════
   FILTROS
══════════════════════════════════ */
.filtros-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  margin-bottom: 32px;
}
.filtro-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.filtro-label {
  font-size: 9px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--muted);
}
.filtro-input, .filtro-select {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--cream);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .2s;
  min-width: 140px;
}
.filtro-input:focus, .filtro-select:focus {
  border-color: var(--gold);
}
.filtro-select option { background: #1a1a18; }

.btn-filtrar {
  align-self: flex-end;
  background: transparent;
  border: 1px solid rgba(201,168,76,.4);
  color: var(--gold);
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .22em;
  text-transform: uppercase;
  padding: 11px 22px;
  cursor: pointer;
  transition: all .3s;
}
.btn-filtrar:hover { background: var(--gold); color: var(--dark); border-color: var(--gold); }

/* ══════════════════════════════════
   CARDS DE PROFISSIONAL
══════════════════════════════════ */
.comissao-grid {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 48px;
}

.comissao-card {
  background: var(--dark2);
  padding: 28px 32px;
  position: relative;
  border-left: 2px solid transparent;
  transition: background .3s, border-color .3s;
  animation: fadeUp .5s ease both;
}
.comissao-card:hover { background: var(--dark3); border-left-color: var(--gold); }

.card-top {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 22px;
}
.prof-avatar-lg {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 2px solid rgba(201,168,76,.25);
  background: var(--dark3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; color: var(--gold);
  overflow: hidden; flex-shrink: 0;
}
.prof-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }

.prof-nome-lg {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; color: var(--cream);
}
.prof-config-tag {
  font-size: 10px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--muted); margin-top: 3px;
}

/* Grade de métricas */
.metricas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 20px;
}
.metrica {
  background: var(--dark);
  padding: 16px 18px;
  text-align: center;
}
.metrica-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: var(--cream);
  line-height: 1;
}
.metrica-val.gold { color: var(--gold); }
.metrica-val.green { color: var(--green); }
.metrica-lbl {
  font-size: 8px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted);
  margin-top: 5px;
}

/* Config inline de comissão */
.config-comissao {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
  margin-bottom: 20px;
  padding: 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
}
.config-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.config-field label {
  font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted);
}
.config-field input {
  background: var(--dark);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--cream);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  width: 110px;
  outline: none;
  transition: border-color .2s;
}
.config-field input:focus { border-color: var(--gold); }
.btn-salvar-config {
  background: transparent;
  border: 1px solid rgba(201,168,76,.4);
  color: var(--gold);
  font-family: 'Barlow', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  padding: 10px 18px;
  cursor: pointer;
  transition: all .3s;
}
.btn-salvar-config:hover { background: var(--gold); color: var(--dark); }
.btn-salvar-config:disabled { opacity: .35; cursor: not-allowed; }

/* Ajustes manuais */
.ajustes-wrap {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 18px;
}
.ajustes-titulo {
  font-size: 9px; letter-spacing: .28em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px;
}
.ajuste-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 12px;
  animation: fadeUp .3s ease both;
}
.ajuste-desc { font-size: 13px; color: var(--cream); flex: 1; }
.ajuste-val {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 700;
}
.ajuste-val.pos { color: var(--green); }
.ajuste-val.neg { color: var(--red); }
.btn-del-ajuste {
  background: none; border: none;
  color: var(--muted); font-size: 16px;
  cursor: pointer; padding: 0 4px;
  transition: color .2s;
  line-height: 1;
}
.btn-del-ajuste:hover { color: var(--red); }

.form-ajuste {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: flex-end;
  margin-top: 14px;
  padding: 14px;
  background: rgba(255,255,255,0.025);
  border: 1px dashed rgba(255,255,255,0.08);
}
.form-ajuste input {
  background: var(--dark);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--cream);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .2s;
}
.form-ajuste input:focus { border-color: var(--gold); }
.form-ajuste input.desc-input { flex: 1; min-width: 160px; }
.form-ajuste input.val-input  { width: 100px; }
.btn-add-ajuste {
  background: transparent;
  border: 1px solid rgba(21,255,0,.3);
  color: var(--green);
  font-family: 'Barlow', sans-serif;
  font-size: 9px; font-weight: 500;
  letter-spacing: .2em; text-transform: uppercase;
  padding: 10px 16px; cursor: pointer;
  transition: all .3s; white-space: nowrap;
}
.btn-add-ajuste:hover { background: var(--green); color: var(--dark); }
.btn-add-ajuste:disabled { opacity: .35; cursor: not-allowed; }

/* Totalizador geral */
.resumo-geral {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,.15);
  padding: 28px 32px;
  margin-bottom: 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  align-items: center;
  animation: fadeUp .5s ease both;
}
.resumo-item { text-align: center; flex: 1; min-width: 120px; }
.resumo-val {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700;
  line-height: 1;
}
.resumo-val.gold { color: var(--gold); }
.resumo-val.green { color: var(--green); }
.resumo-lbl {
  font-size: 9px; letter-spacing: .25em;
  text-transform: uppercase; color: var(--muted);
  margin-top: 6px;
}
.resumo-divider {
  width: 1px; height: 50px;
  background: rgba(255,255,255,0.08);
}

/* Estados */
.loading-state, .empty {
  padding: 48px 32px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  letter-spacing: .05em;
}
.spin {
  width: 20px; height: 20px;
  border: 2px solid rgba(201,168,76,.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <a href="painel.html" class="logo">
    <span data-barber="logo">
      <span class="logo-main" data-barber="nome"></span>
    </span>
  </a>
  <div class="header-right">
    <div class="admin-badge">
      <div class="badge-dot"></div>
      Painel Admin
    </div>
    <a href="login.html" class="btn-sair" onclick="localStorage.removeItem('token')">Sair</a>
  </div>
</header>

<div class="page-intro">
  <div class="intro-inner">
    <div>
      <div class="eyebrow">Financeiro</div>
      <h1 class="page-title">Comissões dos <em>barbeiros</em></h1>
    </div>
  </div>
</div>

<div class="main-wrap">

  <!-- FILTROS -->
  <div class="sec-label">Filtrar período</div>
  <div class="filtros-wrap">
    <div class="filtro-group">
      <span class="filtro-label">Mês</span>
      <input type="month" id="filtroMes" class="filtro-input">
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Dia específico</span>
      <input type="date"  id="filtroData" class="filtro-input">
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Profissional</span>
      <select id="filtroProfissional" class="filtro-select">
        <option value="">Todos</option>
      </select>
    </div>
    <button class="btn-filtrar" id="btnFiltrar">Gerar relatório</button>
  </div>

  <!-- RESUMO GERAL -->
  <div class="sec-label">Resumo do período</div>
  <div class="resumo-geral" id="resumoGeral">
    <div class="loading-state"><div class="spin"></div>Carregando...</div>
  </div>

  <!-- CARDS DE PROFISSIONAIS -->
  <div class="sec-label" style="margin-top:40px;">Detalhamento por profissional</div>
  <div class="comissao-grid" id="comissaoGrid">
    <div class="loading-state"><div class="spin"></div>Carregando...</div>
  </div>

</div>

<div class="menu-botoes">
  <a href="painel.html" class="menu-btn">
    <span class="menu-icon">📋</span>
    Agendamentos
  </a>
  <a href="lucro.html" class="menu-btn lucro">
    <span class="menu-icon">💰</span>
    Lucros
  </a>
  <a href="concluidos.html" class="menu-btn concluidos">
    <span class="menu-icon">✔</span>
    Concluídos
  </a>
</div>

<script src="Saas.js"></script>
<script>
/* ── PARTÍCULAS ── */
(function(){
  const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
  ctx.filter='blur(1.5px)';
  let W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function rand(a,b){return a+Math.random()*(b-a);}
  for(let i=0;i<50;i++)
    pts.push({x:rand(0,1),y:rand(0,1),size:rand(.6,2),speed:rand(.00008,.00018),alpha:rand(.05,.18),drift:rand(-.0001,.0001)});
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.y-=p.speed;p.x+=p.drift;
      if(p.y<0){p.y=1;p.x=rand(0,1);}
      if(p.x<0||p.x>1)p.x=rand(0,1);
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,240,240,${p.alpha})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

/* ── TOAST ── */
function toast(texto, cor){
  cor=cor||'#c9a84c';
  const el=document.createElement('div');
  el.className='toast';el.textContent=texto;el.style.background=cor;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),500);},2800);
}

/* ── UTILS ── */
function fmt(v){ return 'R$ '+Number(v).toFixed(2).replace('.',','); }
function mesAtual(){ return new Date().toISOString().substring(0,7); }

/* ── ESTADO ── */
let profissionaisCache = [];
let mesRef = mesAtual();

/* ── INIT FILTROS ── */
document.getElementById('filtroMes').value = mesRef;

/* Popula select de profissionais */
async function carregarProfissionaisSelect(){
  try {
    const res  = await fetch(`${API}/profissionais`);
    const list = await res.json();
    profissionaisCache = list;
    const sel = document.getElementById('filtroProfissional');
    list.forEach(p=>{
      const opt=document.createElement('option');
      opt.value=p.id; opt.textContent=p.nome;
      sel.appendChild(opt);
    });
  } catch(e){ console.error(e); }
}

/* ── CARREGAR RELATÓRIO ── */
async function carregarRelatorio(){
  const mes   = document.getElementById('filtroMes').value;
  const data  = document.getElementById('filtroData').value;
  const profId= document.getElementById('filtroProfissional').value;

  let url = `${API}/comissoes/relatorio?`;
  if (data)   url += `data=${data}&`;
  else if(mes) url += `mes=${mes}&`;
  if (profId) url += `profissional_id=${profId}&`;

  // Guarda mês de referência para ajustes manuais
  mesRef = data ? data.substring(0,7) : (mes || mesAtual());

  const grid    = document.getElementById('comissaoGrid');
  const resumo  = document.getElementById('resumoGeral');
  grid.innerHTML   = '<div class="loading-state"><div class="spin"></div>Carregando...</div>';
  resumo.innerHTML = '<div class="loading-state"><div class="spin"></div>Carregando...</div>';

  try {
    const res  = await fetch(url);
    const json = await res.json();
    renderResumo(json);
    renderCards(json);
  } catch(e){
    grid.innerHTML   = '<div class="loading-state">⚠️ Erro ao carregar relatório</div>';
    resumo.innerHTML = '';
  }
}

/* ── RESUMO GERAL ── */
function renderResumo(json){
  const rel = json.relatorio || [];
  const totalCortes    = rel.reduce((s,p)=>s+p.total_cortes,0);
  const totalFaturamento = rel.reduce((s,p)=>s+p.faturamento,0);
  const totalComissao  = rel.reduce((s,p)=>s+p.comissao_final,0);
  const totalBarbearia = totalFaturamento - totalComissao;

  document.getElementById('resumoGeral').innerHTML = `
    <div class="resumo-item">
      <div class="resumo-val">${totalCortes}</div>
      <div class="resumo-lbl">Cortes concluídos</div>
    </div>
    <div class="resumo-divider"></div>
    <div class="resumo-item">
      <div class="resumo-val gold">${fmt(totalFaturamento)}</div>
      <div class="resumo-lbl">Faturamento bruto</div>
    </div>
    <div class="resumo-divider"></div>
    <div class="resumo-item">
      <div class="resumo-val" style="color:var(--red)">${fmt(totalComissao)}</div>
      <div class="resumo-lbl">Total comissões</div>
    </div>
    <div class="resumo-divider"></div>
    <div class="resumo-item">
      <div class="resumo-val green">${fmt(totalBarbearia)}</div>
      <div class="resumo-lbl">Fica na barbearia</div>
    </div>
  `;
}

/* ── CARDS DE PROFISSIONAIS ── */
function renderCards(json){
  const grid = document.getElementById('comissaoGrid');
  const rel  = json.relatorio || [];
  grid.innerHTML = '';

  if(rel.length === 0){
    grid.innerHTML = '<div class="loading-state">Nenhum dado encontrado para o período.</div>';
    return;
  }

  rel.forEach((prof, i) => {
    const card = document.createElement('div');
    card.className = 'comissao-card';
    card.style.animationDelay = (i*0.07)+'s';

    const inicial = prof.profissional_nome.trim().charAt(0).toUpperCase();
    const fotoHtml = prof.foto_url
      ? `<img src="${prof.foto_url}" alt="${prof.profissional_nome}" onerror="this.parentElement.textContent='${inicial}'">`
      : inicial;

    // Lista de ajustes
    const ajustesHtml = (prof.ajustes||[]).map(aj => `
      <div class="ajuste-item" data-id="${aj.id}">
        <span class="ajuste-desc">${aj.descricao}</span>
        <span class="ajuste-val ${Number(aj.valor)>=0?'pos':'neg'}">${Number(aj.valor)>=0?'+':''}${fmt(aj.valor)}</span>
        <button class="btn-del-ajuste" title="Remover ajuste" data-ajuste-id="${aj.id}" data-prof-id="${prof.profissional_id}">×</button>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="card-top">
        <div class="prof-avatar-lg">${fotoHtml}</div>
        <div>
          <div class="prof-nome-lg">${prof.profissional_nome}</div>
          <div class="prof-config-tag">${prof.percentual}% + R$${Number(prof.valor_fixo).toFixed(2).replace('.',',')} por corte</div>
        </div>
      </div>

      <div class="metricas-grid">
        <div class="metrica">
          <div class="metrica-val">${prof.total_cortes}</div>
          <div class="metrica-lbl">Cortes</div>
        </div>
        <div class="metrica">
          <div class="metrica-val gold">${fmt(prof.faturamento)}</div>
          <div class="metrica-lbl">Faturamento</div>
        </div>
        <div class="metrica">
          <div class="metrica-val">${fmt(prof.comissao_base)}</div>
          <div class="metrica-lbl">Comissão base</div>
        </div>
        <div class="metrica">
          <div class="metrica-val ${Number(prof.total_ajustes)>=0?'green':''}" style="${Number(prof.total_ajustes)<0?'color:var(--red)':''}">
            ${Number(prof.total_ajustes)>=0?'+':''}${fmt(prof.total_ajustes)}
          </div>
          <div class="metrica-lbl">Ajustes</div>
        </div>
        <div class="metrica">
          <div class="metrica-val green">${fmt(prof.comissao_final)}</div>
          <div class="metrica-lbl">A pagar</div>
        </div>
      </div>

      <!-- Config de comissão -->
      <div class="config-comissao">
        <div class="config-field">
          <label>% Comissão</label>
          <input type="number" class="inp-pct" value="${prof.percentual}" min="0" max="100" step="0.5" placeholder="0">
        </div>
        <div class="config-field">
          <label>R$ fixo / corte</label>
          <input type="number" class="inp-fixo" value="${Number(prof.valor_fixo).toFixed(2)}" min="0" step="0.01" placeholder="0.00">
        </div>
        <button class="btn-salvar-config" data-prof-id="${prof.profissional_id}">Salvar configuração</button>
      </div>

      <!-- Ajustes manuais -->
      <div class="ajustes-wrap">
        <div class="ajustes-titulo">Ajustes manuais — ${mesRef}</div>
        <div class="lista-ajustes">${ajustesHtml || '<div style="color:var(--muted);font-size:12px;padding:8px 0;">Nenhum ajuste neste período</div>'}</div>
        <div class="form-ajuste">
          <input type="text"   class="desc-input" placeholder="Descrição (ex: Bônus semana)">
          <input type="number" class="val-input"  placeholder="Valor (- para desconto)" step="0.01">
          <button class="btn-add-ajuste" data-prof-id="${prof.profissional_id}">+ Adicionar</button>
        </div>
      </div>
    `;

    grid.appendChild(card);

    // Salvar config
    card.querySelector('.btn-salvar-config').addEventListener('click', async function(){
      const btn = this;
      const pct  = card.querySelector('.inp-pct').value;
      const fixo = card.querySelector('.inp-fixo').value;
      btn.disabled = true;
      try {
        const r = await fetch(`${API}/comissoes/config/${prof.profissional_id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ percentual: pct, valor_fixo: fixo })
        });
        const d = await r.json();
        if(d.sucesso) toast('✓ Configuração salva!');
        else toast(d.erro||'Erro ao salvar','#e05050');
      } catch { toast('Erro ao salvar','#e05050'); }
      btn.disabled = false;
    });

    // Adicionar ajuste
    card.querySelector('.btn-add-ajuste').addEventListener('click', async function(){
      const btn  = this;
      const desc = card.querySelector('.desc-input').value.trim();
      const val  = card.querySelector('.val-input').value;
      if(!desc){ toast('Informe a descrição','#e05050'); return; }
      if(!val || isNaN(Number(val))){ toast('Informe o valor','#e05050'); return; }
      btn.disabled = true;
      try {
        const r = await fetch(`${API}/comissoes/ajuste`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            profissional_id: prof.profissional_id,
            descricao: desc,
            valor: Number(val),
            referencia_mes: mesRef
          })
        });
        const d = await r.json();
        if(d.sucesso){ toast('✓ Ajuste adicionado!'); carregarRelatorio(); }
        else toast(d.erro||'Erro','#e05050');
      } catch { toast('Erro','#e05050'); }
      btn.disabled = false;
    });

    // Deletar ajuste (delegação)
    card.querySelectorAll('.btn-del-ajuste').forEach(btn => {
      btn.addEventListener('click', async function(){
        const ajId = this.dataset.ajusteId;
        if(!ajId) return;
        this.disabled = true;
        try {
          const r = await fetch(`${API}/comissoes/ajuste/${ajId}`, { method: 'DELETE' });
          const d = await r.json();
          if(d.sucesso){ toast('Ajuste removido','#e05050'); carregarRelatorio(); }
          else toast(d.erro||'Erro','#e05050');
        } catch { toast('Erro','#e05050'); this.disabled=false; }
      });
    });
  });
}

/* ── BOTÃO FILTRAR ── */
document.getElementById('btnFiltrar').addEventListener('click', carregarRelatorio);

/* Limpa mês se data for preenchida e vice-versa */
document.getElementById('filtroData').addEventListener('change', function(){
  if(this.value) document.getElementById('filtroMes').value = '';
});
document.getElementById('filtroMes').addEventListener('change', function(){
  if(this.value) document.getElementById('filtroData').value = '';
});

/* ── INIT ── */
carregarProfissionaisSelect();
carregarRelatorio();
</script>
</body>
