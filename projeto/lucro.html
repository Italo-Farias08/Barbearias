<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro — Italo Barber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#ffc926;
  --gold2: #ffc926;
  --dark: #080807;
  --dark2: #101010;
  --dark3: #161614;
  --cream: #f0ebe0;
  --muted: #adada5;
  --border: rgba(201,168,76,0.18);
  --border-dim: rgba(255,255,255,0.06);
  --green: #00d40b;
  --red: #e42929;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  background:var(--dark);
  color:var(--cream);
  font-family:'Barlow',sans-serif;
  font-weight:300;
  min-height:100vh;
  overflow-x:hidden;
}

body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9998;
}

@keyframes scan{from{top:0;}to{top:100vh;}}

#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* HEADER */
header{
  position:sticky;top:0;z-index:200;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 56px;
  background:rgba(8,8,7,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;flex-direction:column;line-height:1;text-decoration:none;}
.logo-main{font-family:'Playfair Display',serif;font-weight:900;font-size:19px;letter-spacing:.18em;color:var(--gold);}
.logo-sub{font-size:8px;letter-spacing:.5em;text-transform:uppercase;color:var(--muted);margin-top:3px;}

.header-right{display:flex;align-items:center;gap:12px;}

.btn-voltar{
  display:flex;align-items:center;gap:8px;
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  border:1px solid var(--border-dim);padding:8px 18px;transition:all .3s;
}
.btn-voltar:hover{color:var(--gold);border-color:var(--gold);}

.btn-reload{
  display:flex;align-items:center;gap:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:'Barlow',sans-serif;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  padding:8px 18px;cursor:pointer;transition:all .3s;
}
.btn-reload:hover{border-color:var(--gold);color:var(--gold);}
.btn-reload svg{transition:transform .5s;}
.btn-reload:hover svg{transform:rotate(180deg);}

/* PAGE INTRO */
.page-intro{
  position:relative;padding:56px 96px 44px;
  border-bottom:1px solid var(--border);overflow:hidden;z-index:1;
}
.page-intro::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px);
  background-size:52px 52px;
  -webkit-mask-image:linear-gradient(to bottom,black 0%,transparent 100%);
  mask-image:linear-gradient(to bottom,black 0%,transparent 100%);
  pointer-events:none;
}
.page-intro::after{
  content:'LUCRO';
  position:absolute;top:8px;right:-8px;
  font-family:'Playfair Display',serif;font-size:160px;font-weight:900;
  color:rgba(76,175,122,.04);letter-spacing:.08em;
  pointer-events:none;white-space:nowrap;
}
.intro-inner{position:relative;z-index:1;}

.eyebrow{
  display:flex;align-items:center;gap:14px;
  font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);
  margin-bottom:14px;
}
.eyebrow::before{content:'';width:36px;height:1px;background:var(--gold);}

.page-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,4.5vw,64px);font-weight:900;
  line-height:.95;letter-spacing:-.02em;
}
.page-title em{font-style:italic;color:var(--green);}

/* HERO LUCRO */
.lucro-hero{
  position:relative;z-index:1;
  padding:64px 96px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--dark2);
  border-radius: 10%;
  margin: 10px;
}
.lucro-main{display:flex;
  flex-direction:column;}

.lucro-label{font-size:0.7em;letter-spacing:.45em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.lucro-val{
  font-family:'Playfair Display',serif;
  font-size:clamp(56px,8vw,110px);
  font-weight:900;
  line-height:.9;
  color:var(--green);
  position:relative;
  transition:color .5s;
}
.lucro-val.negativo{color:var(--red);}

.lucro-divider{width:1px;height:120px;background:linear-gradient(to bottom,transparent,var(--border),transparent);}

.lucro-side{display:flex;flex-direction:column;gap:28px;}
.side-item{display:flex;flex-direction:column;gap:4px;}

.side-label{font-size:0.6em;
  letter-spacing:.38em;
  text-transform:uppercase;
  color:var(--muted);}

.side-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;}
.side-val.ganhos-cor{color:var(--gold);}
.side-val.gastos-cor{color:var(--red);}

/* STATS */
.stats-bar{
  display:flex;gap:1px;background:var(--border);
  border:1px solid var(--border);position:relative;z-index:1;
}
.stat{flex:1;background:var(--dark2);padding:20px 24px;text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold);line-height:1;}
.stat-lbl{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:5px;}

/* MAIN */
.main-wrap{position:relative;z-index:1;padding:0 96px 80px;}

.sec-label{
  font-size:10px;
  letter-spacing:.38em;
  text-transform:uppercase;
  color:var(--muted);
  margin:48px 0 24px;
  display:flex;
  align-items:center;
  gap:12px;
  margin: 19px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border-dim);}

/* FORM */
.form-gasto{
  background:var(--dark2);border:1px solid var(--border);
  padding:36px;position:relative;margin-bottom:1px;
}
.form-gasto::before{
  content:'';position:absolute;top:0;right:0;
  width:24px;height:24px;
  border-top:1px solid rgba(201,168,76,.3);
  border-right:1px solid rgba(201,168,76,.3);
}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
.field{display:flex;flex-direction:column;gap:7px;flex:1;min-width:160px;}
.field label{font-size:9px;letter-spacing:.38em;text-transform:uppercase;color:var(--muted);}
.field input{
  background:var(--dark3);
  border:none;
  border-bottom:1px solid var(--border-dim);
  color:var(--cream);
  font-family:'Barlow',sans-serif;
  font-size:16px;
  font-weight:300;
  padding:12px 0;
  outline:none;
  transition:border-color .3s;
  letter-spacing:.04em;
  border-radius: 10px;
}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:rgba(106,106,98,.45);}

.btn-salvar{
  display:flex;align-items:center;gap:10px;
  background:var(--gold);color:var(--dark);border:none;
  font-family:'Barlow',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.25em;text-transform:uppercase;
  padding:14px 28px;cursor:pointer;transition:background .3s,gap .3s;white-space:nowrap;
  border-radius: 10px;
}
.btn-salvar:hover{background:var(--gold2);gap:14px;}
.btn-salvar svg{transition:transform .3s;}
.btn-salvar:hover svg{transform:translateX(3px);}

/* LISTA */
#lista{display:flex;flex-direction:column;gap:1px;background:var(--border);}

.item{
  background:var(--dark2);
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 28px;
  border-left:2px solid transparent;
  transition:background .3s,border-color .3s;
  animation:fadeUp .4s ease both;position:relative;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.item:hover{background:var(--dark3);border-left-color:var(--red);}

.item-info{display:flex;flex-direction:column;gap:3px;}
.item-desc{font-size:14px;letter-spacing:.03em;}
.item-meta{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);}

.item-right{display:flex;align-items:center;gap:20px;}
.item-valor{font-family:'Playfair Display',serif;font-size:20px;color:var(--red);}

.btn-del{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;
  background:transparent;color:var(--red);
  border:1px solid rgba(224,80,80,.3);cursor:pointer;
  transition:all .3s;flex-shrink:0;
}
.btn-del:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* EMPTY / LOADING */
.empty{padding:52px 28px;text-align:center;background:var(--dark2);}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.35;}
.empty-txt{font-size:12px;letter-spacing:.15em;color:var(--muted);}

.loading-state{
  padding:48px 28px;background:var(--dark2);
  display:flex;align-items:center;justify-content:center;gap:12px;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
}
.spin{
  width:16px;height:16px;
  border:1.5px solid var(--gold);border-top-color:transparent;
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(10px);
  padding:12px 28px;font-size:11px;font-weight:500;
  letter-spacing:.15em;color:#000;
  z-index:9999;opacity:0;transition:opacity .4s,transform .4s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RESPONSIVE */
@media(max-width:1000px){
  header{padding:16px 20px;}
  .page-intro{padding:48px 24px 40px;}
  .lucro-hero{padding:48px 24px;flex-direction:column;gap:36px;align-items:flex-start;}
  .lucro-divider{width:100%;height:1px;}
  .lucro-side{flex-direction:row;gap:36px;}
  .main-wrap{padding:0 0 60px;}
  .form-gasto{padding:28px 20px;}
  .stats-bar{flex-direction:column;}
  .item{padding:16px 18px;}
}
</style>
</head>
<body>


<canvas id="particles"></canvas>

<header>
  <a href="index.html" class="logo">
    <span class="logo-main" data-barber="nome">GOLD LINE</span>
    <span class="logo-sub" data-barber="cidade">· Pernambuco</span>
  </a>
  <div class="header-right">
    <a href="painel.html" class="btn-voltar">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M8 2L4 6.5 8 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Painel
    </a>
    <button class="btn-reload" onclick="atualizarTudo()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M12.5 7A5.5 5.5 0 1 1 7 1.5c1.8 0 3.4.87 4.4 2.2M12.5 1.5v3.5H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Atualizar
    </button>
  </div>
</header>

<div class="page-intro">
  <div class="intro-inner">
    <div class="eyebrow">Painel financeiro</div>
    <h1 class="page-title">Seu <em>lucro real</em></h1>
  </div>
</div>

<div class="lucro-hero">
  <div class="lucro-main">
    <div class="lucro-label">Lucro real</div>
    <div class="lucro-val" id="lucro">R$ 0,00</div>
  </div>
  <div class="lucro-divider"></div>
  <div class="lucro-side">
    <div class="side-item">
      <span class="side-label">Ganhos totais</span>
      <span class="side-val ganhos-cor" id="ganhos">R$ 0,00</span>
    </div>
    <div class="side-item">
      <span class="side-label">Total de gastos</span>
      <span class="side-val gastos-cor" id="gastos">R$ 0,00</span>
    </div>
  </div>
</div>



<div class="main-wrap">
  <div class="sec-label">Registrar gasto</div>
  <div class="form-gasto">
    <div class="form-row">
      <div class="field">
        <label>Descrição</label>
        <input id="desc" type="text" placeholder="     Ex: Máquina, Produto...">
      </div>
      <div class="field" style="max-width:180px;">
        <label>Valor (R$)</label>
        <input id="valor" type="number" placeholder="    0,00" min="0" step="0.01">
      </div>
      <button class="btn-salvar" onclick="addGasto()">
        Salvar
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="sec-label">Gastos registrados</div>
  <div id="lista"></div>
</div>
<script src="Saas.js"></script>
<script src="lucro.js"></script>
</body>
</html>
